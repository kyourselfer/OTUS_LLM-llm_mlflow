apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-server
  labels:
    app: triton-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-server
  template:
    metadata:
      labels:
        app: triton-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: init-model-repo
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /models/identity/1
              cat >/models/identity/config.pbtxt <<'EOF'
              name: "identity"
              backend: "identity"
              max_batch_size: 0
              input [
                {
                  name: "INPUT__0"
                  data_type: TYPE_FP32
                  dims: [ 1 ]
                }
              ]
              output [
                {
                  name: "OUTPUT__0"
                  data_type: TYPE_FP32
                  dims: [ 1 ]
                }
              ]
              EOF
          volumeMounts:
            - name: model-repo
              mountPath: /models
      containers:
        - name: triton
          image: ghcr.io/triton-inference-server/server:23.10-py3
          imagePullPolicy: IfNotPresent
          args:
            - tritonserver
            - --model-repository=/models
            - --http-port=8000
            - --grpc-port=8001
            - --metrics-port=8002
            - --allow-http=true
            - --allow-grpc=true
            - --strict-model-config=false
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 8001
            - name: metrics
              containerPort: 8002
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: model-repo
              mountPath: /models
      volumes:
        - name: model-repo
          emptyDir: {}


