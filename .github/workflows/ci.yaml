name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r inference/requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check inference

      - name: Type-check (mypy)
        run: mypy inference

      - name: Build Docker image
        run: docker build -t llm-ops-workshop:ci -f inference/Dockerfile .

  kind-e2e:
    runs-on: ubuntu-latest
    needs: build-and-lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up kind cluster
        uses: helm/kind-action@v1.9.0
        with:
          cluster_name: llm
      - name: Deploy app
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deploy/llm-inference
      - name: Smoke test
        run: |
          kubectl port-forward svc/llm-inference 8080:80 &
          sleep 5
          curl -sSf http://localhost:8080/healthz | jq .status | grep -q ok

